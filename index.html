<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Shop - Categories</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="/index.css">

<body>
    <header>
        <div class="navbar">
            <div class="logo">Fashion Shop</div>
            <div class="search-bar">
                <input type="text" placeholder="Search in Store...">
                <button><i class="fas fa-search"></i></button>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <a href="help.html" style="color: white; text-decoration: none; font-size: 16px; font-weight: bold;"><i class="fas fa-question-circle"></i> Help</a>

                    <i class="fas fa-shopping-cart"></i>

            </div>
